<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Slide Decks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; background: #0b0b14; color: #e2e8f0; max-width: 600px; margin: 80px auto; padding: 0 24px; }
    h1 { margin-bottom: 24px; font-weight: 700; letter-spacing: -0.03em; }
    ul { list-style: none; padding: 0; }
    li { margin: 12px 0; }
    a { font-size: 1.1rem; color: #7dd3fc; text-decoration: none; font-weight: 500; }
    a:hover { color: #bae6fd; }
  </style>
</head>
<body>
  <h1>Slide Decks</h1>
  <ul id="decks"></ul>
  <script>
    fetch('/api/decks')
      .then(r => r.json())
      .then(decks => {
        const ul = document.getElementById('decks');
        if (!decks.length) {
          ul.innerHTML = '<li>No decks found. Add a .md file to the <code>decks/</code> folder.</li>';
          return;
        }
        decks.forEach(d => {
          ul.innerHTML += `<li><a href="/present.html?deck=${d.name}">${d.name}</a></li>`;
        });
      });
  </script>
</body>
</html>
